name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .[tuning]
          python -m pip install build twine pytest

      - name: Run tests
        run: pytest -q

      - name: Run CLI smoke tests
        run: |
          python -m grail_metabolism predict CCO --rules grail_metabolism/resources/example_rules.txt
          python -m grail_metabolism presets --export-dir /tmp/grail_presets

      - name: Build release artifacts
        run: bash scripts/build_release.sh
