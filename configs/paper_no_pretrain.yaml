name: paper_no_pretrain
description: 'Ablation: generator without any USPTO-style pretraining'
output_dir: artifacts
tags:
- ablation
- no-pretrain
dataset:
  train_sdf: grail_metabolism/data/train.sdf
  train_triples: grail_metabolism/data/train_triples.txt
  val_sdf: grail_metabolism/data/val.sdf
  val_triples: grail_metabolism/data/val_triples.txt
  test_sdf: grail_metabolism/data/test.sdf
  test_triples: grail_metabolism/data/test_triples.txt
  rules_path: grail_metabolism/resources/extended_smirks.txt
  uspto_csv: grail_metabolism/data/USPTO_FULL.csv
  use_clean_splits: true
  standardize: true
  pca: false
  augment_negatives: false
  max_uspto_rows: 10000
  max_train_substrates: null
  max_val_substrates: null
  max_test_substrates: null
  sampling_seed: 42
  excluded_substrates: []
  excluded_substrates_path: grail_metabolism/resources/slow_substrates.txt
generator:
  in_channels: 16
  edge_dim: 18
  hidden_dims:
  - 192
  - 256
  rule_hidden_dims:
  - 128
  - 192
  - 128
  projection_dim: 128
  scoring: retrieval
  use_pretraining: false
  freeze_pretrained: false
  use_maccs_pretraining: false
  top_k: 128
  threshold: null
  conv_kind: gatv2
  use_fingerprint: true
  rank_weight: 0.25
  ranking_margin: 0.45
  prior_strength: 0.4
  use_applicability_mask: true
  applicability_penalty: 7.5
  candidate_aggregation: noisy_or
filter:
  in_channels: 18
  edge_dim: 18
  hidden_dims:
  - 192
  - 256
  - 128
  - 128
  - 64
  - 32
  mode: pair
  model_type: GATv2Filter
  conv_kind: gatv2
  use_graph: true
  use_fingerprint: true
  dropout: 0.1
  molpath_cutoff: null
  molpath_y: null
  molpath_hidden: null
  train_on_candidates: false
  candidate_generation_top_k: 200
pretrain:
  enabled: false
  epochs: 30
  batch_size: 128
  lr: 0.0001
  contrastive_ratio: 0.4
  maccs_ratio: 0.3
  masked_ratio: 0.3
  save_path: null
generator_optim:
  lr: 0.0001
  epochs: 20
  batch_size: 64
  weight_decay: 1.0e-06
  prior: 0.75
  nnpu: true
  patience: 7
  min_delta: 0.0001
filter_optim:
  lr: 0.0001
  epochs: 20
  batch_size: 64
  weight_decay: 1.0e-06
  prior: 0.75
  nnpu: false
  patience: 7
  min_delta: 0.0001
evaluation:
  generator_top_k:
  - 1
  - 3
  - 5
  - 10
  - 20
  candidate_top_k: 128
  threshold: null
  export_predictions: true
